AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AI-Powered Product Listing Optimiser
  Uploads a product CSV to S3, triggers Lambda, rewrites listings via Bedrock,
  outputs optimised CSV and sends email notification via SES.

Parameters:
  ProjectName:
    Type: String
    Default: listing-optimiser
    Description: Used as a prefix for all resource names

  NotificationEmail:
    Type: String
    Description: Email address to receive optimised listing notifications
    Default: your-email@example.com

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-sonnet-20240229-v1:0
    Description: Bedrock model ID to use for listing optimisation

Resources:

  # -----------------------------------------------------------
  # S3 Buckets
  # -----------------------------------------------------------

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-input-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldInputFiles
            Status: Enabled
            ExpirationInDays: 30
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .csv
            Function: !GetAtt OptimiserLambda.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: dev

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-output-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldOutputFiles
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: dev

  # -----------------------------------------------------------
  # IAM Role for Lambda
  # -----------------------------------------------------------

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-lambda-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "arn:aws:s3:::${ProjectName}-input-${AWS::AccountId}/*"

              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${ProjectName}-output-${AWS::AccountId}/*"

              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                Resource: "*"

              - Effect: Allow
                Action:
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                  - aws-marketplace:Unsubscribe
                Resource: "*"

              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref NotificationTopic

              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-optimiser:*"

      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # Lambda Function
  # -----------------------------------------------------------

  OptimiserLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-optimiser"
      Description: Triggered by S3 upload or API Gateway; reads product CSV, calls Bedrock, writes optimised CSV
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          OUTPUT_BUCKET: !Ref OutputBucket
          SNS_TOPIC_ARN: !Ref NotificationTopic
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          import json
          import csv
          import boto3
          import os
          import logging
          import io
          import base64
          from datetime import datetime

          logger = logging.getLogger()
          logger.setLevel(os.environ.get('LOG_LEVEL', 'INFO'))

          s3 = boto3.client('s3')
          bedrock = boto3.client('bedrock-runtime')
          sns = boto3.client('sns')

          OUTPUT_BUCKET = os.environ['OUTPUT_BUCKET']
          SNS_TOPIC_ARN = os.environ['SNS_TOPIC_ARN']
          BEDROCK_MODEL_ID = os.environ['BEDROCK_MODEL_ID']

          CORS_HEADERS = {
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'OPTIONS,POST'
          }

          def optimise_listing(product):
              prompt = f"""You are an expert Amazon listing copywriter.
          Optimise the following product listing for Amazon search (Rufus/A9 algorithm).

          Return ONLY valid JSON with these exact fields:
          - optimised_title (max 200 chars, keyword-rich)
          - bullet_1 through bullet_5 (benefit-led, max 255 chars each)
          - optimised_description (max 2000 chars, paragraph form)
          - listing_score (integer 0-100)
          - score_notes (brief improvement notes)

          Product data:
          Title: {product.get('title', '')}
          Description: {product.get('description', '')}
          Brand: {product.get('brand', '')}
          Category: {product.get('category', '')}
          Price: {product.get('price', '')}
          ASIN: {product.get('asin', '')}

          Return only the JSON object, no markdown, no preamble."""

              body = json.dumps({
                  "anthropic_version": "bedrock-2023-05-31",
                  "max_tokens": 1500,
                  "messages": [{"role": "user", "content": prompt}]
              })

              response = bedrock.invoke_model(
                  modelId=BEDROCK_MODEL_ID,
                  body=body,
                  contentType='application/json',
                  accept='application/json'
              )

              result = json.loads(response['body'].read())
              text = result['content'][0]['text']
              return json.loads(text)

          def process_products(products):
              results = []
              total = len(products)
              for i, product in enumerate(products):
                  logger.info(f"Optimising product {i+1}/{total}: {product.get('title','')[:50]}")
                  try:
                      optimised = optimise_listing(product)
                      results.append({**product, **optimised})
                  except Exception as e:
                      logger.error(f"Failed to optimise product {i+1}: {str(e)}")
                      results.append({
                          **product,
                          'optimised_title': 'ERROR - could not optimise',
                          'bullet_1': str(e),
                          'bullet_2': '', 'bullet_3': '', 'bullet_4': '', 'bullet_5': '',
                          'optimised_description': '',
                          'listing_score': 0,
                          'score_notes': 'Processing failed'
                      })
              return results

          def write_output_csv(results, filename):
              timestamp = datetime.now().strftime('%Y%m%d-%H%M%S')
              output_key = f"optimised/{timestamp}-{filename}"
              output_buffer = io.StringIO()
              fieldnames = list(results[0].keys())
              writer = csv.DictWriter(output_buffer, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(results)
              s3.put_object(
                  Bucket=OUTPUT_BUCKET,
                  Key=output_key,
                  Body=output_buffer.getvalue().encode('utf-8'),
                  ContentType='text/csv'
              )
              return output_key

          def generate_presigned_url(key):
              return s3.generate_presigned_url(
                  'get_object',
                  Params={'Bucket': OUTPUT_BUCKET, 'Key': key},
                  ExpiresIn=3600
              )

          def handler(event, context):
              logger.info(f"Event received: {json.dumps(event)}")

              # CORS preflight
              if event.get('httpMethod') == 'OPTIONS':
                  return {'statusCode': 200, 'headers': CORS_HEADERS, 'body': ''}

              # API Gateway POST request from website
              if event.get('httpMethod') == 'POST':
                  try:
                      body = event.get('body', '')
                      if event.get('isBase64Encoded'):
                          body = base64.b64decode(body).decode('utf-8')

                      reader = csv.DictReader(io.StringIO(body))
                      products = list(reader)

                      if not products:
                          return {
                              'statusCode': 400,
                              'headers': CORS_HEADERS,
                              'body': json.dumps({'error': 'No products found in CSV'})
                          }

                      logger.info(f"API request: processing {len(products)} products")
                      results = process_products(products)
                      output_key = write_output_csv(results, 'web-upload.csv')
                      download_url = generate_presigned_url(output_key)

                      scores = [r.get('listing_score', 0) for r in results if isinstance(r.get('listing_score'), int)]
                      avg_score = round(sum(scores) / len(scores)) if scores else 0

                      return {
                          'statusCode': 200,
                          'headers': CORS_HEADERS,
                          'body': json.dumps({
                              'success': True,
                              'products_processed': len(results),
                              'average_score': avg_score,
                              'download_url': download_url,
                              'preview': [
                                  {
                                      'original_title': r.get('title', ''),
                                      'optimised_title': r.get('optimised_title', ''),
                                      'listing_score': r.get('listing_score', 0),
                                      'score_notes': r.get('score_notes', '')
                                  }
                                  for r in results[:3]
                              ]
                          })
                      }

                  except Exception as e:
                      logger.error(f"API error: {str(e)}")
                      return {
                          'statusCode': 500,
                          'headers': CORS_HEADERS,
                          'body': json.dumps({'error': str(e)})
                      }

              # S3 trigger (original flow)
              for record in event.get('Records', []):
                  bucket = record['s3']['bucket']['name']
                  key = record['s3']['object']['key']
                  logger.info(f"S3 trigger: processing s3://{bucket}/{key}")
                  obj = s3.get_object(Bucket=bucket, Key=key)
                  content = obj['Body'].read().decode('utf-8')
                  reader = csv.DictReader(io.StringIO(content))
                  products = list(reader)
                  results = process_products(products)
                  if results:
                      output_key = write_output_csv(results, key.split('/')[-1])
                      logger.info(f"Output written to s3://{OUTPUT_BUCKET}/{output_key}")
                      sns.publish(
                          TopicArn=SNS_TOPIC_ARN,
                          Subject='Product Listing Optimiser - Complete',
                          Message=f"Optimised {len(results)} products.\nOutput: s3://{OUTPUT_BUCKET}/{output_key}"
                      )

              return {'statusCode': 200, 'body': 'Optimisation complete'}

      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # Lambda Permission - allow S3 to invoke Lambda
  # -----------------------------------------------------------

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OptimiserLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:s3:::${ProjectName}-input-${AWS::AccountId}"

  # -----------------------------------------------------------
  # SNS Topic for Notifications
  # -----------------------------------------------------------

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-notifications"
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # CloudWatch Log Group
  # -----------------------------------------------------------

  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-optimiser"
      RetentionInDays: 14

  # -----------------------------------------------------------
  # API Gateway
  # -----------------------------------------------------------

  ListingOptimiserApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api"
      Description: API for the product listing optimiser website
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      ParentId: !GetAtt ListingOptimiserApi.RootResourceId
      PathPart: optimise

  ApiOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      ResourceId: !Ref ApiResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OptimiserLambda.Arn}/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiPostMethod
      - ApiOptionsMethod
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      StageName: prod

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OptimiserLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ListingOptimiserApi}/*/*"

# -----------------------------------------------------------
# Outputs
# -----------------------------------------------------------

Outputs:
  InputBucketName:
    Description: Upload your product CSV files here
    Value: !Ref InputBucket
    Export:
      Name: !Sub "${ProjectName}-input-bucket"

  OutputBucketName:
    Description: Optimised CSV files will appear here
    Value: !Ref OutputBucket
    Export:
      Name: !Sub "${ProjectName}-output-bucket"

  LambdaFunctionName:
    Description: Lambda function that runs the optimisation
    Value: !Ref OptimiserLambda
    Export:
      Name: !Sub "${ProjectName}-lambda"

  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt OptimiserLambda.Arn

  SNSTopicArn:
    Description: SNS topic for notifications
    Value: !Ref NotificationTopic

  CloudWatchLogGroup:
    Description: Lambda logs location
    Value: !Ref LambdaLogGroup

  ApiEndpoint:
    Description: API endpoint URL for the website
    Value: !Sub "https://${ListingOptimiserApi}.execute-api.${AWS::Region}.amazonaws.com/prod/optimise"
    Export:
      Name: !Sub "${ProjectName}-api-endpoint"
