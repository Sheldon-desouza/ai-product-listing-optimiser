AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AI-Powered Product Listing Optimiser - Async Architecture
  API Gateway returns job ID instantly. Processor Lambda runs async.
  Website polls for status. No more 504 timeouts.

Parameters:
  ProjectName:
    Type: String
    Default: listing-optimiser
  NotificationEmail:
    Type: String
    Default: sheldondesouza99@gmail.com
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0

Resources:

  # -----------------------------------------------------------
  # S3 Buckets
  # -----------------------------------------------------------

  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-input-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldInputFiles
            Status: Enabled
            ExpirationInDays: 30
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .csv
            Function: !GetAtt ProcessorLambda.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-output-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldOutputFiles
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # DynamoDB - Job Status Table
  # -----------------------------------------------------------

  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-jobs"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # IAM Role for both Lambdas
  # -----------------------------------------------------------

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub "${ProjectName}-lambda-policy"
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                Resource: !Sub "arn:aws:s3:::${ProjectName}-input-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${ProjectName}-output-${AWS::AccountId}/*"
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                  - aws-marketplace:ViewSubscriptions
                  - aws-marketplace:Subscribe
                  - aws-marketplace:Unsubscribe
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt JobsTable.Arn
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectName}-processor"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref NotificationTopic
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # Orchestrator Lambda - returns job ID instantly
  # -----------------------------------------------------------

  OrchestratorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-orchestrator"
      Description: Receives CSV from website, creates job in DynamoDB, triggers processor async, returns job ID immediately
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          JOBS_TABLE: !Ref JobsTable
          PROCESSOR_FUNCTION: !Sub "${ProjectName}-processor"
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import uuid
          import logging
          from datetime import datetime, timezone

          logger = logging.getLogger()
          logger.setLevel(os.environ.get('LOG_LEVEL', 'INFO'))

          dynamodb = boto3.resource('dynamodb')
          lambda_client = boto3.client('lambda')

          JOBS_TABLE = os.environ['JOBS_TABLE']
          PROCESSOR_FUNCTION = os.environ['PROCESSOR_FUNCTION']

          CORS = {
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'OPTIONS,POST,GET'
          }

          def handler(event, context):
              logger.info(f"Event: {json.dumps(event)[:500]}")

              if event.get('httpMethod') == 'OPTIONS':
                  return {'statusCode': 200, 'headers': CORS, 'body': ''}

              # Status check: GET /optimise?job_id=xxx
              if event.get('httpMethod') == 'GET':
                  job_id = (event.get('queryStringParameters') or {}).get('job_id')
                  if not job_id:
                      return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Missing job_id'})}

                  table = dynamodb.Table(JOBS_TABLE)
                  result = table.get_item(Key={'job_id': job_id})
                  item = result.get('Item')

                  if not item:
                      return {'statusCode': 404, 'headers': CORS, 'body': json.dumps({'error': 'Job not found'})}

                  return {
                      'statusCode': 200,
                      'headers': CORS,
                      'body': json.dumps({
                          'job_id': job_id,
                          'status': item.get('status'),
                          'products_processed': item.get('products_processed', 0),
                          'total_products': item.get('total_products', 0),
                          'average_score': item.get('average_score', 0),
                          'download_url': item.get('download_url', ''),
                          'preview': item.get('preview', []),
                          'error': item.get('error', '')
                      })
                  }

              # New job: POST /optimise
              if event.get('httpMethod') == 'POST':
                  try:
                      body = event.get('body', '')
                      if event.get('isBase64Encoded'):
                          import base64
                          body = base64.b64decode(body).decode('utf-8')

                      if not body or not body.strip():
                          return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'Empty CSV body'})}

                      # Count products
                      lines = [l for l in body.strip().split('\n') if l.strip()]
                      total = max(0, len(lines) - 1)

                      if total == 0:
                          return {'statusCode': 400, 'headers': CORS, 'body': json.dumps({'error': 'No products found in CSV'})}

                      # Create job in DynamoDB
                      job_id = str(uuid.uuid4())
                      ttl = int(datetime.now(timezone.utc).timestamp()) + 86400  # 24hr TTL

                      table = dynamodb.Table(JOBS_TABLE)
                      table.put_item(Item={
                          'job_id': job_id,
                          'status': 'processing',
                          'total_products': total,
                          'products_processed': 0,
                          'created_at': datetime.now(timezone.utc).isoformat(),
                          'ttl': ttl
                      })

                      # Invoke processor asynchronously
                      lambda_client.invoke(
                          FunctionName=PROCESSOR_FUNCTION,
                          InvocationType='Event',  # async - no wait
                          Payload=json.dumps({'job_id': job_id, 'csv_body': body})
                      )

                      logger.info(f"Job {job_id} created for {total} products")

                      return {
                          'statusCode': 202,
                          'headers': CORS,
                          'body': json.dumps({
                              'job_id': job_id,
                              'status': 'processing',
                              'total_products': total,
                              'message': 'Job started. Poll /optimise?job_id=' + job_id + ' for status.'
                          })
                      }

                  except Exception as e:
                      logger.error(f"Error: {str(e)}")
                      return {'statusCode': 500, 'headers': CORS, 'body': json.dumps({'error': str(e)})}

              return {'statusCode': 405, 'headers': CORS, 'body': json.dumps({'error': 'Method not allowed'})}
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # Processor Lambda - runs async, no timeout pressure
  # -----------------------------------------------------------

  ProcessorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-processor"
      Description: Processes products through Bedrock async. Updates DynamoDB with progress and results.
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          OUTPUT_BUCKET: !Sub "${ProjectName}-output-${AWS::AccountId}"
          JOBS_TABLE: !Ref JobsTable
          SNS_TOPIC_ARN: !Ref NotificationTopic
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          LOG_LEVEL: INFO
      Code:
        ZipFile: |
          import json
          import csv
          import boto3
          import os
          import logging
          import io
          from datetime import datetime, timezone
          from decimal import Decimal

          logger = logging.getLogger()
          logger.setLevel(os.environ.get('LOG_LEVEL', 'INFO'))

          s3 = boto3.client('s3')
          bedrock = boto3.client('bedrock-runtime')
          sns = boto3.client('sns')
          dynamodb = boto3.resource('dynamodb')

          OUTPUT_BUCKET = os.environ['OUTPUT_BUCKET']
          JOBS_TABLE = os.environ['JOBS_TABLE']
          SNS_TOPIC_ARN = os.environ['SNS_TOPIC_ARN']
          BEDROCK_MODEL_ID = os.environ['BEDROCK_MODEL_ID']

          def optimise_listing(product):
              prompt = f"""You are an expert Amazon listing copywriter.
          Optimise the following product listing for Amazon search (Rufus/A9 algorithm).

          Return ONLY valid JSON with these exact fields:
          - optimised_title (max 200 chars, keyword-rich)
          - bullet_1 through bullet_5 (benefit-led, max 255 chars each)
          - optimised_description (max 2000 chars, paragraph form)
          - listing_score (integer 0-100)
          - score_notes (brief improvement notes)

          Product data:
          Title: {product.get('title', '')}
          Description: {product.get('description', '')}
          Brand: {product.get('brand', '')}
          Category: {product.get('category', '')}
          Price: {product.get('price', '')}
          ASIN: {product.get('asin', '')}

          Return only the JSON object, no markdown, no preamble."""

              body = json.dumps({
                  "anthropic_version": "bedrock-2023-05-31",
                  "max_tokens": 1500,
                  "messages": [{"role": "user", "content": prompt}]
              })

              response = bedrock.invoke_model(
                  modelId=BEDROCK_MODEL_ID,
                  body=body,
                  contentType='application/json',
                  accept='application/json'
              )

              result = json.loads(response['body'].read())
              text = result['content'][0]['text']
              return json.loads(text)

          def update_job(table, job_id, updates):
              expr = 'SET ' + ', '.join(f'#{k} = :{k}' for k in updates)
              names = {f'#{k}': k for k in updates}
              values = {f':{k}': v for k, v in updates.items()}
              table.update_item(
                  Key={'job_id': job_id},
                  UpdateExpression=expr,
                  ExpressionAttributeNames=names,
                  ExpressionAttributeValues=values
              )

          def handler(event, context):
              logger.info(f"Processor started: {json.dumps(event)[:200]}")

              # Handle S3 trigger
              if 'Records' in event:
                  for record in event['Records']:
                      bucket = record['s3']['bucket']['name']
                      key = record['s3']['object']['key']
                      obj = s3.get_object(Bucket=bucket, Key=key)
                      csv_body = obj['Body'].read().decode('utf-8')
                      process_csv(csv_body, job_id=None)
                  return

              # Handle async invoke from orchestrator
              job_id = event.get('job_id')
              csv_body = event.get('csv_body', '')

              if not csv_body:
                  logger.error("No CSV body provided")
                  return

              process_csv(csv_body, job_id)

          def process_csv(csv_body, job_id):
              table = dynamodb.Table(JOBS_TABLE) if job_id else None

              reader = csv.DictReader(io.StringIO(csv_body))
              products = list(reader)
              total = len(products)
              logger.info(f"Processing {total} products for job {job_id}")

              results = []
              for i, product in enumerate(products):
                  logger.info(f"Optimising {i+1}/{total}: {product.get('title','')[:40]}")
                  try:
                      optimised = optimise_listing(product)
                      results.append({**product, **optimised})
                  except Exception as e:
                      logger.error(f"Failed product {i+1}: {str(e)}")
                      results.append({
                          **product,
                          'optimised_title': 'ERROR',
                          'bullet_1': str(e), 'bullet_2': '', 'bullet_3': '',
                          'bullet_4': '', 'bullet_5': '', 'optimised_description': '',
                          'listing_score': 0, 'score_notes': 'Failed'
                      })

                  # Update progress in DynamoDB
                  if table:
                      update_job(table, job_id, {'products_processed': Decimal(i + 1)})

              # Write output CSV
              timestamp = datetime.now().strftime('%Y%m%d-%H%M%S')
              output_key = f"optimised/{timestamp}-{job_id or 's3-trigger'}.csv"
              buf = io.StringIO()
              writer = csv.DictWriter(buf, fieldnames=list(results[0].keys()))
              writer.writeheader()
              writer.writerows(results)
              s3.put_object(
                  Bucket=OUTPUT_BUCKET,
                  Key=output_key,
                  Body=buf.getvalue().encode('utf-8'),
                  ContentType='text/csv'
              )

              # Generate presigned URL
              download_url = s3.generate_presigned_url(
                  'get_object',
                  Params={'Bucket': OUTPUT_BUCKET, 'Key': output_key},
                  ExpiresIn=3600
              )

              # Build preview
              scores = [r.get('listing_score', 0) for r in results if isinstance(r.get('listing_score'), int)]
              avg_score = round(sum(scores) / len(scores)) if scores else 0
              preview = [
                  {
                      'original_title': r.get('title', ''),
                      'optimised_title': r.get('optimised_title', ''),
                      'listing_score': r.get('listing_score', 0),
                      'score_notes': r.get('score_notes', '')
                  }
                  for r in results[:3]
              ]

              # Mark job complete in DynamoDB
              if table:
                  update_job(table, job_id, {
                      'status': 'complete',
                      'products_processed': Decimal(total),
                      'average_score': Decimal(avg_score),
                      'download_url': download_url,
                      'preview': preview,
                      'completed_at': datetime.now(timezone.utc).isoformat()
                  })

              logger.info(f"Job {job_id} complete. Output: {output_key}")

              try:
                  sns.publish(
                      TopicArn=SNS_TOPIC_ARN,
                      Subject='Listing Optimiser Complete',
                      Message=f"Optimised {total} products. Avg score: {avg_score}/100"
                  )
              except Exception:
                  pass
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # Lambda Permissions
  # -----------------------------------------------------------

  S3InvokeProcessorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ProcessorLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:s3:::${ProjectName}-input-${AWS::AccountId}"

  ApiInvokeOrchestratorPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OrchestratorLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ListingOptimiserApi}/*/*"

  # -----------------------------------------------------------
  # SNS Topic
  # -----------------------------------------------------------

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-notifications"
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  # -----------------------------------------------------------
  # CloudWatch Log Groups
  # -----------------------------------------------------------

  OrchestratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-orchestrator"
      RetentionInDays: 14

  ProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-processor"
      RetentionInDays: 14

  # -----------------------------------------------------------
  # API Gateway
  # -----------------------------------------------------------

  ListingOptimiserApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api"
      EndpointConfiguration:
        Types:
          - REGIONAL

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      ParentId: !GetAtt ListingOptimiserApi.RootResourceId
      PathPart: optimise

  ApiOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      ResourceId: !Ref ApiResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'OPTIONS,POST,GET'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ApiPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      ResourceId: !Ref ApiResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorLambda.Arn}/invocations"

  ApiGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorLambda.Arn}/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiPostMethod
      - ApiGetMethod
      - ApiOptionsMethod
    Properties:
      RestApiId: !Ref ListingOptimiserApi
      StageName: prod

# -----------------------------------------------------------
# Outputs
# -----------------------------------------------------------

Outputs:
  InputBucketName:
    Value: !Ref InputBucket
    Export:
      Name: !Sub "${ProjectName}-input-bucket"

  OutputBucketName:
    Value: !Ref OutputBucket
    Export:
      Name: !Sub "${ProjectName}-output-bucket"

  JobsTableName:
    Value: !Ref JobsTable
    Export:
      Name: !Sub "${ProjectName}-jobs-table"

  OrchestratorFunctionName:
    Value: !Ref OrchestratorLambda

  ProcessorFunctionName:
    Value: !Ref ProcessorLambda

  ApiEndpoint:
    Description: API endpoint URL for the website
    Value: !Sub "https://${ListingOptimiserApi}.execute-api.${AWS::Region}.amazonaws.com/prod/optimise"
    Export:
      Name: !Sub "${ProjectName}-api-endpoint"
